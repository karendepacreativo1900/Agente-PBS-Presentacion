<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estado de la IA en los Negocios LATAM 2025</title>
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Source+Sans+Pro:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"><\/script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #faf8f5; --coral: #ff6b6b; --dark: #1a1a2e;
    --gold: #ffd93d; --gray: #e8e4de; --text-muted: #8a8580; --white: #ffffff;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--cream); font-family: 'Source Sans Pro', sans-serif; color: var(--dark); overflow-x: hidden; }
  *, *::before, *::after { box-sizing: border-box; }

  .section-label {
    font-size: 11px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 12px;
  }
  .section-label::before { content: ''; display: inline-block; width: 32px; height: 2px; background: var(--coral); }

  section { padding: 100px 5vw; position: relative; }

  .animate-in { opacity: 0; transform: translateY(40px); transition: opacity 0.8s ease, transform 0.8s ease; }
  .animate-in.visible { opacity: 1; transform: translateY(0); }

  /* PORTADA */
  #portada {
    min-height: 100vh; background: var(--dark); display: flex; flex-direction: column;
    justify-content: center; align-items: flex-start; padding: 80px 8vw; overflow: hidden; position: relative;
  }
  #portada::before {
    content: '2025'; position: absolute; right: -2vw; top: 50%; transform: translateY(-50%);
    font-family: 'Abril Fatface', serif; font-size: clamp(200px, 28vw, 420px);
    color: rgba(255,255,255,0.03); pointer-events: none; user-select: none; line-height: 1;
  }
  #portada::after {
    content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 4px;
    background: linear-gradient(90deg, var(--coral), var(--gold), var(--coral));
    background-size: 200% 100%; animation: shimmer 3s linear infinite;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes wordReveal { to { opacity: 1; transform: translateY(0); } }
  @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(6px); } }
  @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }
  @keyframes pulseArrow { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.7; } }

  .portada-tag { font-size: 11px; font-weight: 700; letter-spacing: 5px; text-transform: uppercase; color: var(--coral); margin-bottom: 2rem; opacity: 0; animation: fadeSlideUp 0.6s ease 0.3s forwards; }
  .portada-title { font-family: 'Abril Fatface', serif; font-size: clamp(42px, 7.5vw, 110px); line-height: 1.0; color: var(--white); margin-bottom: 2rem; max-width: 900px; }
  .portada-title .word { display: inline-block; overflow: hidden; margin-right: 0.25em; }
  .portada-title .word span { display: inline-block; opacity: 0; transform: translateY(100%); animation: wordReveal 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  .portada-title .word:nth-child(1) span { animation-delay: 0.5s; }
  .portada-title .word:nth-child(2) span { animation-delay: 0.65s; }
  .portada-title .word:nth-child(3) span { animation-delay: 0.8s; }
  .portada-title .word:nth-child(4) span { animation-delay: 0.95s; }
  .portada-title .word:nth-child(5) span { animation-delay: 1.1s; }
  .portada-title .word:nth-child(6) span { animation-delay: 1.25s; }
  .portada-title .word:nth-child(7) span { animation-delay: 1.4s; }
  .portada-title .word:nth-child(8) span { animation-delay: 1.55s; }
  .portada-subtitle { font-size: clamp(16px, 2vw, 22px); font-weight: 300; color: rgba(255,255,255,0.6); max-width: 560px; line-height: 1.6; opacity: 0; animation: fadeSlideUp 0.8s ease 1.8s forwards; margin-bottom: 3rem; }
  .portada-meta { display: flex; align-items: center; gap: 2rem; flex-wrap: wrap; opacity: 0; animation: fadeSlideUp 0.8s ease 2.1s forwards; }
  .year-badge { display: inline-flex; align-items: center; justify-content: center; background: var(--coral); color: var(--white); font-family: 'Abril Fatface', serif; font-size: 28px; padding: 8px 24px; border-radius: 4px; }
  .portada-edition { font-size: 13px; color: rgba(255,255,255,0.4); line-height: 1.5; }
  .scroll-indicator { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 8px; opacity: 0; animation: fadeSlideUp 0.8s ease 2.5s forwards; cursor: pointer; }
  .scroll-indicator span { font-size: 10px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.3); }
  .scroll-arrow { width: 40px; height: 40px; border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; animation: bounce 2s ease infinite; }
  .scroll-arrow::after { content: ''; width: 8px; height: 8px; border-right: 2px solid rgba(255,255,255,0.5); border-bottom: 2px solid rgba(255,255,255,0.5); transform: rotate(45deg) translateY(-2px); }

  /* NUMERO GIGANTE */
  #numero-gigante { background: var(--coral); color: var(--white); text-align: center; padding: 120px 5vw; }
  #numero-gigante .section-label { color: rgba(255,255,255,0.6); justify-content: center; }
  #numero-gigante .section-label::before { background: rgba(255,255,255,0.4); }
  .giant-number-wrap { display: flex; align-items: baseline; justify-content: center; gap: 0.05em; margin: 1rem 0 1.5rem; }
  .giant-number { font-family: 'Abril Fatface', serif; font-size: clamp(100px, 22vw, 280px); line-height: 1; color: var(--white); display: inline-block; }
  .giant-suffix { font-family: 'Abril Fatface', serif; font-size: clamp(48px, 10vw, 120px); color: rgba(255,255,255,0.5); line-height: 1; }
  .giant-label { font-size: clamp(18px, 3vw, 32px); font-weight: 300; max-width: 600px; margin: 0 auto; line-height: 1.5; opacity: 0.9; }
  .giant-note { font-size: 13px; opacity: 0.6; margin-top: 2rem; letter-spacing: 1px; }

  /* BARRAS */
  #barras { background: var(--cream); padding: 120px 5vw; }
  .barras-header { max-width: 700px; margin-bottom: 4rem; }
  .barras-title { font-family: 'Abril Fatface', serif; font-size: clamp(32px, 5vw, 64px); line-height: 1.1; color: var(--dark); margin-bottom: 1rem; }
  .barras-desc { font-size: 18px; font-weight: 300; color: var(--text-muted); line-height: 1.6; }
  .bar-chart-container { max-width: 800px; }
  .bar-item { margin-bottom: 2rem; opacity: 0; transform: translateX(-20px); transition: opacity 0.5s ease, transform 0.5s ease; }
  .bar-item.visible { opacity: 1; transform: translateX(0); }
  .bar-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.5rem; }
  .bar-country { font-weight: 700; font-size: 18px; color: var(--dark); }
  .bar-pct { font-family: 'Abril Fatface', serif; font-size: 28px; color: var(--coral); }
  .bar-track { height: 14px; background: var(--gray); border-radius: 7px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 7px; width: 0; transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1); position: relative; }
  .bar-fill::after { content: ''; position: absolute; right: 0; top: 0; width: 6px; height: 100%; background: rgba(255,255,255,0.4); border-radius: 0 7px 7px 0; }

  /* TIMELINE */
  #timeline { background: var(--dark); padding: 120px 5vw; overflow: hidden; }
  #timeline .section-label { color: rgba(255,255,255,0.4); }
  #timeline .section-label::before { background: var(--gold); }
  .timeline-title { font-family: 'Abril Fatface', serif; font-size: clamp(32px, 5vw, 64px); color: var(--white); margin-bottom: 3rem; max-width: 600px; }
  .timeline-svg-wrap { overflow-x: auto; padding-bottom: 20px; }
  #timelineSVG { display: block; min-width: 700px; width: 100%; }
  .milestone-dot { opacity: 0; transition: opacity 0.4s ease; }
  .milestone-dot.show { opacity: 1; }
  .milestone-text { opacity: 0; transition: opacity 0.4s ease; }
  .milestone-text.show { opacity: 1; }

  /* DONUT */
  #donut { background: var(--cream); padding: 120px 5vw; }
  .donut-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; max-width: 1000px; }
  @media (max-width: 768px) { .donut-layout { grid-template-columns: 1fr; } }
  .donut-info h2 { font-family: 'Abril Fatface', serif; font-size: clamp(28px, 4vw, 52px); line-height: 1.1; margin-bottom: 1.5rem; }
  .donut-info p { font-size: 17px; font-weight: 300; color: var(--text-muted); line-height: 1.7; margin-bottom: 2rem; }
  .legend-list { list-style: none; }
  .legend-item { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--gray); font-size: 15px; font-weight: 600; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .legend-val { margin-left: auto; font-family: 'Abril Fatface', serif; font-size: 20px; }
  .donut-chart-wrap { position: relative; max-width: 360px; margin: 0 auto; }
  .donut-center-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none; }
  .donut-center-label .big { font-family: 'Abril Fatface', serif; font-size: 42px; color: var(--dark); line-height: 1; display: block; }
  .donut-center-label .small { font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); }

  /* PICTOGRAMA */
  #pictograma { background: #f0ece4; padding: 120px 5vw; }
  .picto-header { max-width: 600px; margin-bottom: 3rem; }
  .picto-title { font-family: 'Abril Fatface', serif; font-size: clamp(28px, 4vw, 52px); line-height: 1.1; margin-bottom: 1rem; }
  .picto-desc { font-size: 17px; font-weight: 300; color: var(--text-muted); line-height: 1.6; }
  .picto-grid { display: flex; flex-wrap: wrap; gap: 8px; max-width: 680px; margin-bottom: 2rem; }
  .picto-icon { font-size: 32px; line-height: 1; filter: grayscale(1) opacity(0.3); transform: scale(0); }
  .picto-icon.adopted { filter: none; }
  .picto-icon.pop { animation: popIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  .picto-legend { display: flex; gap: 2rem; flex-wrap: wrap; }
  .picto-leg-item { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; }
  .picto-leg-icon { font-size: 22px; }

  /* ANTES DESPUES */
  #antes-despues { background: var(--dark); padding: 120px 5vw; }
  #antes-despues .section-label { color: rgba(255,255,255,0.4); }
  #antes-despues .section-label::before { background: var(--gold); }
  .transform-title { font-family: 'Abril Fatface', serif; font-size: clamp(28px, 4vw, 52px); color: var(--white); margin-bottom: 4rem; max-width: 600px; line-height: 1.1; }
  .transform-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 2rem; align-items: center; max-width: 900px; }
  @media (max-width: 640px) { .transform-grid { grid-template-columns: 1fr; text-align: center; } .transform-extras { grid-template-columns: 1fr !important; } }
  .transform-card { padding: 3rem; border-radius: 12px; }
  .transform-card.before { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); }
  .transform-card.after { background: var(--coral); }
  .transform-card-label { font-size: 11px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 1rem; color: rgba(255,255,255,0.5); }
  .transform-card.after .transform-card-label { color: rgba(255,255,255,0.7); }
  .transform-stat { font-family: 'Abril Fatface', serif; font-size: clamp(52px, 9vw, 96px); color: var(--white); line-height: 1; margin-bottom: 0.5rem; }
  .transform-stat-sub { font-size: 16px; font-weight: 300; color: rgba(255,255,255,0.6); line-height: 1.5; }
  .transform-card.after .transform-stat-sub { color: rgba(255,255,255,0.8); }
  .transform-arrow { display: flex; flex-direction: column; align-items: center; gap: 8px; color: var(--gold); }
  .arrow-icon { font-size: 48px; display: block; animation: pulseArrow 2s ease infinite; }
  .arrow-label { font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); }
  .transform-extras { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; max-width: 900px; margin-top: 3rem; }
  .extra-stat { padding: 1.5rem; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; }
  .extra-stat-num { font-family: 'Abril Fatface', serif; font-size: 42px; color: var(--gold); line-height: 1; }
  .extra-stat-label { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 0.5rem; line-height: 1.4; }

  /* AREA CHART */
  #area-chart { background: var(--cream); padding: 120px 5vw; }
  .area-header { max-width: 700px; margin-bottom: 3rem; }
  .area-title { font-family: 'Abril Fatface', serif; font-size: clamp(28px, 4.5vw, 58px); line-height: 1.1; margin-bottom: 1rem; }
  .area-desc { font-size: 18px; font-weight: 300; color: var(--text-muted); line-height: 1.6; }
  .area-chart-wrap { position: relative; max-width: 1000px; }
  .area-legend { display: flex; gap: 2rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .area-leg-item { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; }
  .area-leg-line { width: 32px; height: 3px; border-radius: 2px; }
  .area-leg-line.dashed { background: repeating-linear-gradient(90deg, #ffd93d 0, #ffd93d 6px, transparent 6px, transparent 12px); }

  /* FOOTER */
  footer { background: var(--dark); padding: 60px 5vw; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1.5rem; border-top: 4px solid var(--coral); }
  .footer-brand { font-family: 'Abril Fatface', serif; font-size: 22px; color: var(--white); }
  .footer-brand span { color: var(--coral); }
  .footer-note { font-size: 13px; color: rgba(255,255,255,0.3); max-width: 400px; line-height: 1.6; }
  .footer-year { font-family: 'Abril Fatface', serif; font-size: 48px; color: rgba(255,255,255,0.08); }

  /* PROGRESS BAR */
  #progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: linear-gradient(90deg, var(--coral), var(--gold)); width: 0%; z-index: 9999; transition: width 0.1s linear; }
</style>
</head>

      <g class="milestone-dot" id="dot3"><circle cx="648" cy="160" r="14" fill="#ff6b6b"/><circle cx="648" cy="160" r="7" fill="#1a1a2e"/></g>
      <g class="milestone-text" id="txt3">

        <text x="844" y="224" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="10.5" font-family="Source Sans Pro,sans-serif">USD $8.2B invertidos.</text>
        <text x="844" y="237" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="10.5" font-family="Source Sans Pro,sans-serif">50% empresas activas</text>

      <g class="milestone-text" id="txt5">
        <line x1="1040" y1="150" x2="1040" y2="110" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
        <text x="1040" y="100" text-anchor="middle" fill="#ffd93d" font-size="13" font-family="Source Sans Pro,sans-serif" font-weight="700">2025</text>

<!-- SECTION 5: DONUT CHART -->
<section id="donut">

  <div class="donut-layout">
    <div class="donut-info animate-in">
      <h2>¿Para qué<br>usan IA las<br>empresas LATAM?</h2>
      <p>La automatización de procesos lidera la adopción, seguida de análisis de datos e inteligencia de clientes. Los sectores financiero y retail encabezan la implementación.</p>

        <li class="legend-item"><span class="legend-dot" style="background:#ff6b6b"></span>Automatización de procesos<span class="legend-val" style="color:#ff6b6b">32%</span></li>
        <li class="legend-item"><span class="legend-dot" style="background:#ffd93d"></span>Análisis de datos / BI<span class="legend-val" style="color:#ffd93d">24%</span></li>

<section id="pictograma">
  <div class="picto-header animate-in">

  <div class="picto-grid animate-in" id="pictoGrid"></div>
  <div class="picto-legend animate-in">

    <div class="extra-stat"><div class="extra-stat-num">+41%</div><div class="extra-stat-label">Aumento en productividad medida por output por empleado</div></div>
    <div class="extra-stat"><div class="extra-stat-num">-38%</div><div class="extra-stat-label">Reducción en costos operativos de back-office en los primeros 18 meses</div></div>
    <div class="extra-stat"><div class="extra-stat-num">3.2×</div><div class="extra-stat-label">Retorno sobre inversión (ROI) promedio en año 2 de implementación</div></div>
  </div>
</section>

<!-- SECTION 8: AREA CHART -->
<section id="area-chart">
  <div class="area-header animate-in">
    <p class="section-label">Inversión IA · 2020–2030</p>
    <h2 class="area-title">La ola de inversión<br>no frena</h2>
    <p class="area-desc">La inversión en IA en LATAM alcanzó USD $14.7 mil millones en 2025. Las proyecciones indican que podría superar los $40 mil millones para 2030.</p>
  </div>
  <div class="area-chart-wrap animate-in">
    <div class="area-legend">
      <div class="area-leg-item"><div class="area-leg-line" style="background:#ff6b6b;"></div><span>Inversión real (USD miles de millones)</span></div>
      <div class="area-leg-item"><div class="area-leg-line dashed"></div><span>Proyección estimada 2026–2030</span></div>
    </div>
    <canvas id="areaCanvas"></canvas>
  </div>
</section>

<footer>
  <div class="footer-brand">IA<span>LATAM</span> Report</div>
  <p class="footer-note">Datos compilados a partir de encuestas propias, reportes de IDC, ECLAC/CEPAL y análisis de Bloomberg Intelligence. Muestra de 3,412 empresas en Brasil, México, Argentina, Colombia y Chile. Período: enero–octubre 2025.</p>
  <div class="footer-year">2025</div>
</footer>

<script>
// PROGRESS BAR
window.addEventListener('scroll', () => {
  const pct = (window.scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100;
  document.getElementById('progress-bar').style.width = Math.min(pct, 100) + '%';
});

// GENERIC ANIMATE-IN
const genericObs = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.15 });
document.querySelectorAll('.animate-in').forEach(el => genericObs.observe(el));

// COUNTER
let counterDone = false;
function animCounter(el, to, dur) {
  const s = performance.now();
  (function tick(now) {
    const p = Math.min((now - s) / dur, 1);
    el.textContent = Math.round(to * (1 - Math.pow(1 - p, 4)));
    if (p < 1) requestAnimationFrame(tick);
  })(performance.now());
}
new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting && !counterDone) {
      counterDone = true;
      animCounter(document.getElementById('counterNum'), 78, 2200);
    }
  });
}, { threshold: 0.4 }).observe(document.getElementById('numero-gigante'));

// BARS
new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.querySelectorAll('.bar-item').forEach(item => {
        const d = parseInt(item.dataset.delay || 0);
        setTimeout(() => {
          item.classList.add('visible');
          const fill = item.querySelector('.bar-fill');
          setTimeout(() => { fill.style.width = fill.dataset.value + '%'; }, 100);
        }, d);
      });
    }
  });
}, { threshold: 0.2 }).observe(document.querySelector('.bar-chart-container'));

// TIMELINE
let tlDone = false;
function runTimeline() {
  const anim = document.getElementById('animLine');
  const base = document.getElementById('mainLine');
  base.style.strokeDashoffset = '0';
  const dur = 2200, total = 980, t0 = performance.now();
  const pts = [{t:0,i:0},{t:0.2,i:1},{t:0.4,i:2},{t:0.6,i:3},{t:0.8,i:4},{t:1.0,i:5}];
  const shown = new Set();
  (function frame(now) {
    const p = Math.min((now - t0) / dur, 1);
    const e = 1 - Math.pow(1 - p, 3);
    anim.style.strokeDashoffset = total * (1 - e);
    pts.forEach(({t, i}) => {
      if (p >= t && !shown.has(i)) {
        shown.add(i);
        const dot = document.getElementById('dot' + i);
        const txt = document.getElementById('txt' + i);
        if (dot) dot.classList.add('show');
        if (txt) setTimeout(() => txt.classList.add('show'), 180);
      }
    });
    if (p < 1) requestAnimationFrame(frame);
  })(performance.now());
}
new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting && !tlDone) { tlDone = true; runTimeline(); }
  });
}, { threshold: 0.2 }).observe(document.getElementById('timeline'));

// DONUT
let donutDone = false;
new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting && !donutDone) {
      donutDone = true;
      const ctx = document.getElementById('donutCanvas').getContext('2d');
      new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['Automatización','Análisis de datos','Atención al cliente','Marketing','Ciberseguridad'],
          datasets: [{ data: [32,24,19,14,11], backgroundColor: ['#ff6b6b','#ffd93d','#4ecdc4','#a8e6cf','#c3b1e1'], borderColor: '#faf8f5', borderWidth: 4, hoverOffset: 10 }]
        },
        options: {
          cutout: '68%', responsive: true,
          animation: { animateRotate: true, animateScale: true, duration: 1600, easing: 'easeOutQuart' },
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: c => ' ' + c.label + ': ' + c.parsed + '%' }, backgroundColor: '#1a1a2e', padding: 12 }
          }
        }
      });
    }
  });
}, { threshold: 0.3 }).observe(document.getElementById('donut'));

// PICTOGRAM
const pg = document.getElementById('pictoGrid');
const icns = ['🧑','👩','👨','🧕','👦','🧔','👧','🧑‍💼'];
for (let i = 0; i < 100; i++) {
  const s = document.createElement('span');
  s.className = 'picto-icon' + (i < 78 ? ' adopted' : '');
  s.textContent = icns[i % icns.length];
  pg.appendChild(s);
}
let pictoDone = false;
new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting && !pictoDone) {
      pictoDone = true;
      pg.querySelectorAll('.picto-icon').forEach((ic, i) => {
        setTimeout(() => ic.classList.add('pop'), i * 16);
      });
    }
  });
}, { threshold: 0.2 }).observe(document.getElementById('pictograma'));

// AREA CHART
let areaDone = false;
new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting && !areaDone) {
      areaDone = true;
      const canvas = document.getElementById('areaCanvas');
      const ctx = canvas.getContext('2d');
      const gr = ctx.createLinearGradient(0,0,0,400);
      gr.addColorStop(0,'rgba(255,107,107,0.42)'); gr.addColorStop(1,'rgba(255,107,107,0.02)');
      const gp = ctx.createLinearGradient(0,0,0,400);
      gp.addColorStop(0,'rgba(255,217,61,0.28)'); gp.addColorStop(1,'rgba(255,217,61,0.02)');
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: ['2020','2021','2022','2023','2024','2025','2026','2027','2028','2029','2030'],
          datasets: [
            { label: 'Inversión real', data: [1.8,2.9,4.1,6.0,8.2,14.7,null,null,null,null,null], borderColor:'#ff6b6b', borderWidth:3, backgroundColor:gr, fill:true, tension:0.42, pointBackgroundColor:'#ff6b6b', pointBorderColor:'#faf8f5', pointBorderWidth:2, pointRadius:6, pointHoverRadius:9, spanGaps:false },
            { label: 'Proyección', data: [null,null,null,null,null,14.7,18.5,24.0,30.5,36.8,42.3], borderColor:'#ffd93d', borderWidth:3, borderDash:[8,5], backgroundColor:gp, fill:true, tension:0.42, pointBackgroundColor:'#ffd93d', pointBorderColor:'#faf8f5', pointBorderWidth:2, pointRadius:5, pointHoverRadius:8, spanGaps:false }
          ]
        },
        options: {
          responsive: true,
          animation: { duration: 2000, easing: 'easeOutQuart' },
          interaction: { mode:'index', intersect:false },
          plugins: {
            legend: { display: false },
            tooltip: {
              filter: i => i.parsed.y !== null,
              callbacks: { label: c => c.parsed.y !== null ? ' ' + c.dataset.label + ': $' + c.parsed.y + 'B' : null },
              backgroundColor:'#1a1a2e', padding:14
            }
          },
          scales: {
            x: { grid: { color:'rgba(26,26,46,0.07)' }, ticks: { font:{family:'Source Sans Pro',size:12,weight:'600'}, color:'#8a8580' } },
            y: { grid: { color:'rgba(26,26,46,0.07)' }, ticks: { font:{family:'Source Sans Pro',size:12}, color:'#8a8580', callback: v => '$'+v+'B' }, title: { display:true, text:'USD Miles de Millones', font:{family:'Source Sans Pro',size:12}, color:'#8a8580' } }
          }
        }
      });
    }
  });
}, { threshold: 0.2 }).observe(document.getElementById('area-chart'));
</script>
</body>
</html>
